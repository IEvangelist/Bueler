<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark circular background -->
  <circle cx="256" cy="256" r="248" fill="url(#dark)"/>
  <circle cx="256" cy="256" r="245" fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.6"/>

  <!-- Crab body — clean geometric shape -->
  <ellipse cx="256" cy="270" rx="100" ry="68" fill="url(#brand)"/>

  <!-- Shell segment lines (texture) -->
  <path d="M200 260 Q256 230 312 260" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <path d="M185 275 Q256 245 327 275" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="2"/>

  <!-- Claws — bold, symmetric pincers -->
  <!-- Left claw -->
  <path d="M156 260 C130 240 105 215 115 190 C120 178 135 178 140 190 C148 210 148 235 156 260Z" fill="url(#brand)"/>
  <path d="M156 260 C125 255 95 235 95 215 C95 200 110 198 118 210 C130 228 145 248 156 260Z" fill="url(#brand)"/>
  <!-- Right claw -->
  <path d="M356 260 C382 240 407 215 397 190 C392 178 377 178 372 190 C364 210 364 235 356 260Z" fill="url(#brand)"/>
  <path d="M356 260 C387 255 417 235 417 215 C417 200 402 198 394 210 C382 228 367 248 356 260Z" fill="url(#brand)"/>

  <!-- Eyes — large, expressive, on stalks -->
  <!-- Left eye stalk -->
  <rect x="210" y="200" width="10" height="30" rx="5" fill="#d4590a"/>
  <!-- Right eye stalk -->
  <rect x="292" y="200" width="10" height="30" rx="5" fill="#d4590a"/>
  <!-- Left eye -->
  <circle cx="215" cy="195" r="20" fill="#1a1a1a"/>
  <circle cx="219" cy="190" r="7" fill="#fff"/>
  <circle cx="222" cy="187" r="3" fill="#fff" opacity="0.6"/>
  <!-- Right eye -->
  <circle cx="297" cy="195" r="20" fill="#1a1a1a"/>
  <circle cx="301" cy="190" r="7" fill="#fff"/>
  <circle cx="304" cy="187" r="3" fill="#fff" opacity="0.6"/>

  <!-- Legs — 3 pairs, jointed -->
  <!-- Left legs -->
  <line x1="178" y1="300" x2="128" y2="330" stroke="#e8630c" stroke-width="5" stroke-linecap="round"/>
  <line x1="128" y1="330" x2="110" y2="360" stroke="#e8630c" stroke-width="4" stroke-linecap="round"/>
  <line x1="170" y1="318" x2="122" y2="355" stroke="#e8630c" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="122" y1="355" x2="112" y2="385" stroke="#e8630c" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="172" y1="332" x2="132" y2="375" stroke="#e8630c" stroke-width="4" stroke-linecap="round"/>
  <line x1="132" y1="375" x2="128" y2="400" stroke="#e8630c" stroke-width="3" stroke-linecap="round"/>
  <!-- Right legs -->
  <line x1="334" y1="300" x2="384" y2="330" stroke="#e8630c" stroke-width="5" stroke-linecap="round"/>
  <line x1="384" y1="330" x2="402" y2="360" stroke="#e8630c" stroke-width="4" stroke-linecap="round"/>
  <line x1="342" y1="318" x2="390" y2="355" stroke="#e8630c" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="390" y1="355" x2="400" y2="385" stroke="#e8630c" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="340" y1="332" x2="380" y2="375" stroke="#e8630c" stroke-width="4" stroke-linecap="round"/>
  <line x1="380" y1="375" x2="384" y2="400" stroke="#e8630c" stroke-width="3" stroke-linecap="round"/>

  <!-- Mouth — happy -->
  <path d="M232 290 Q256 312 280 290" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Code angle brackets on body — subtle watermark -->
  <text x="235" y="278" font-family="'Courier New',monospace" font-size="26" font-weight="700" fill="rgba(0,0,0,0.18)" letter-spacing="-1">&lt;/&gt;</text>

  <!-- "BUELER" wordmark below -->
  <text x="256" y="455" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="900" fill="#e0e0e0" letter-spacing="6">BUELER</text>
  <text x="256" y="478" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#666" letter-spacing="3">RUST WEB FRAMEWORK</text>
</svg>
